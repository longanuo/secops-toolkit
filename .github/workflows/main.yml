name: SecOps CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        make install

    - name: Lint with flake8
      run: |
        make lint

    - name: Run unit tests
      run: |
        make test

    - name: Validate Demo Tenant Config
      run: |
        secopsctl validate examples/tenant-demo.yaml
